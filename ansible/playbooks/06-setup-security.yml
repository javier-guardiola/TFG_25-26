---
- name: "06. Configuración de Seguridad (UFW)"
  hosts: lxc_containers
  become: yes
  tasks:
    - name: "Instalar UFW (Uncomplicated Firewall)"
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: "Regla Global: Permitir SSH"
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: "Regla Proxy: Permitir tráfico Web (80 y 443)"
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['80', '443']
      when: "'proxy-tfg' in group_names"

    - name: "Regla WebApp: Solo desde el Proxy (8000)"
      community.general.ufw:
        rule: allow
        port: '8000'
        from_ip: "{{ proxy_ip }}"
      when: "'webapp-tfg' in group_names"

    - name: "Regla DB: Solo desde la WebApp (3306)"
      community.general.ufw:
        rule: allow
        port: '3306'
        from_ip: "{{ webapp_ip }}"
      when: "'db-tfg' in group_names"

    - name: "Activar Firewall y establecer política por defecto (Deny)"
      community.general.ufw:
        state: enabled
        policy: deny